<script src="{{"/assets/lib/bootstrap/bootstrap.bundle.min.js" | relative_url }}"></script>

<script>
    (function () {
        var nav = document.querySelector(".navbar-top");
        if (!nav) return;

        function toggleScrolledClass() {
            var threshold = nav.offsetHeight;
            nav.classList.toggle("scrolled", window.scrollY > threshold);
        }

        toggleScrolledClass();
        document.addEventListener("scroll", toggleScrolledClass, { passive: true });
    })();
</script>
